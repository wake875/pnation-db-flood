name: dns-monitor

on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Check DNS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python dns_monitor.py
